<svg width="840" height="260" viewBox="0 0 840 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes flow { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    @keyframes clk { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .stage { fill: #0f172a; stroke: #334155; stroke-width: 1.5; }
    .stage-active { fill: #064e3b; stroke: #10b981; stroke-width: 2; }
    .label { font-family: 'Fira Code', 'Courier New', monospace; fill: #64748b; font-size: 10px; font-weight: bold; }
    .title { font-family: 'Fira Code', monospace; fill: #f8fafc; font-size: 12px; font-weight: bold; }
    .tech { font-family: 'Fira Code', monospace; fill: #38bdf8; font-size: 9px; }
    .tech-alt { font-family: 'Fira Code', monospace; fill: #94a3b8; font-size: 9px; }
    .connector { stroke: #334155; stroke-dasharray: 4 2; animation: flow 1s infinite linear; }
    .clk { font-family: monospace; fill: #38bdf8; font-size: 9px; animation: clk 1s infinite; }
  </style>

  <rect width="840" height="260" rx="8" fill="#020617"/>

  <!-- 仿真状态栏 -->
  <text x="20" y="30" class="clk"># SIM_CLOCK: 0x4A2B</text>
  <text x="160" y="30" class="clk" style="animation-delay:0.5s"># PIPELINE: STABLE</text>
  <text x="290" y="30" class="clk" style="animation-delay:1s"># STAGE: MEM (PlanV)</text>

  <!-- Stage 1: HIT -->
  <g transform="translate(20, 65)">
    <rect width="145" height="120" rx="4" class="stage"/>
    <text x="10" y="20" class="label">IF: FETCH</text>
    <text x="10" y="45" class="title">HIT 🇨🇳</text>
    <text x="10" y="65" class="tech-alt">Fuxin / Harbin</text>
    <text x="10" y="90" class="tech">B.Sc. EE</text>
    <text x="10" y="105" class="tech">Logic Found.</text>
  </g>

  <!-- Stage 2: TUM -->
  <g transform="translate(185, 65)">
    <rect width="145" height="120" rx="4" class="stage"/>
    <text x="10" y="20" class="label">ID: DECODE</text>
    <text x="10" y="45" class="title">TUM 🇩🇪</text>
    <text x="10" y="65" class="tech-alt">Munich</text>
    <text x="10" y="90" class="tech">M.Sc. EE</text>
    <text x="10" y="105" class="tech">Digital System</text>
  </g>

  <!-- Stage 3: Infineon -->
  <g transform="translate(350, 65)">
    <rect width="145" height="120" rx="4" class="stage"/>
    <text x="10" y="20" class="label">EX: EXECUTE</text>
    <text x="10" y="45" class="title">Infineon</text>
    <text x="10" y="65" class="tech-alt">Internship</text>
    <text x="10" y="85" class="tech" fill="#f59e0b">SV / UVM</text>
    <text x="10" y="100" class="tech" fill="#f59e0b">cocotb / pyuvm</text>
  </g>

  <!-- Stage 4: PlanV (active) -->
  <g transform="translate(515, 65)">
    <rect width="145" height="120" rx="4" class="stage-active"/>
    <text x="10" y="20" class="label" fill="#10b981">MEM: ACCESS &lt;-- HERE</text>
    <text x="10" y="45" class="title">PlanV</text>
    <text x="10" y="65" class="tech-alt" fill="#f8fafc">DV Eng.</text>
    <text x="10" y="85" class="tech" fill="#34d399">Verilator / RISC-V</text>
    <text x="10" y="100" class="tech" fill="#34d399">Open-Source DV</text>
  </g>

  <!-- Stage 5: Life -->
  <g transform="translate(680, 65)">
    <rect width="140" height="120" rx="4" class="stage" stroke="#8b5cf6"/>
    <text x="10" y="20" class="label" fill="#a78bfa">WB: WRITEBACK</text>
    <text x="10" y="45" class="title">Life &amp; AI</text>
    <text x="10" y="65" class="tech-alt">OSS Enthusiast</text>
    <text x="10" y="90" class="tech" fill="#a78bfa">AI for Hardware</text>
    <text x="10" y="105" class="tech" fill="#a78bfa">Open Source</text>
  </g>

  <!-- 连接器 & 数据流 -->
  <path d="M165 125 H185" class="connector"/>
  <circle r="3" fill="#10b981"><animateMotion path="M165 125 H185" dur="3s" repeatCount="indefinite" begin="0s"/></circle>
  <path d="M330 125 H350" class="connector"/>
  <circle r="3" fill="#10b981"><animateMotion path="M330 125 H350" dur="3s" repeatCount="indefinite" begin="0.6s"/></circle>
  <path d="M495 125 H515" class="connector"/>
  <circle r="3" fill="#10b981"><animateMotion path="M495 125 H515" dur="3s" repeatCount="indefinite" begin="1.2s"/></circle>
  <path d="M660 125 H680" class="connector"/>
  <circle r="3" fill="#10b981"><animateMotion path="M660 125 H680" dur="3s" repeatCount="indefinite" begin="1.8s"/></circle>

  <!-- 底部 tagline -->
  <text x="20" y="225" class="tech-alt">// career_pipeline.sv · 5-stage, forwarding enabled, hazard-free</text>
  <text x="20" y="243" class="tech-alt" fill="#475569">// wangyilou@github · Munich · 2026</text>
</svg>
